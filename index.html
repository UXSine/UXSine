<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1C1209" />
    <title>UXSine</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #1C1209;
        color: #FDF8F2;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        padding: 24px;
      }
      .wrap {
        max-width: 420px;
        width: 100%;
      }
      h1 {
        font-size: 22px;
        margin: 0 0 24px;
        text-align: center;
        letter-spacing: 0.02em;
      }
      .card {
        display: block;
        text-decoration: none;
        color: inherit;
        background: rgba(253, 248, 242, 0.06);
        border: 1px solid rgba(253, 248, 242, 0.14);
        border-radius: 16px;
        padding: 20px;
        margin-bottom: 14px;
        transition: background 0.15s ease;
      }
      .card:hover {
        background: rgba(253, 248, 242, 0.12);
      }
      .card__title {
        font-size: 17px;
        font-weight: 600;
        margin-bottom: 4px;
      }
      .card__desc {
        font-size: 13px;
        opacity: 0.7;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>UXSine</h1>
      <a class="card" href="./75-hard/">
        <div class="card__title">75 Hard Tracker</div>
        <div class="card__desc">Track your 75 Hard challenge — 75 days, zero excuses.</div>
      </a>
      <a class="card" href="./moab-trail/">
        <div class="card__title">Kane Creek — Moab Trail Training Tracker</div>
        <div class="card__desc">Personal training tracker for the Moab Trail Half Marathon — 10 weeks on the Wasatch trails.</div>
      </a>
    </div>
  </body>
</html>
