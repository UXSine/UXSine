name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build 75-hard
        working-directory: apps/75-hard
        run: |
          npm ci
          npm run build

      - name: Build moab-trail
        working-directory: apps/moab-trail
        run: |
          npm ci
          npm run build

      - name: Assemble site
        run: |
          mkdir -p site
          cp index.html site/index.html
          cp -r apps/75-hard/dist site/75-hard
          cp -r apps/moab-trail/dist site/moab-trail

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
